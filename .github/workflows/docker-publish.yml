name: Build and publish Docker images

# Builds the three expo-builder-local images (runner, orchestrator, web — see
# scripts/publish-images.sh for the manual equivalent) and pushes them to Docker Hub
# on every v* tag push, so `docker pull <dockerhub-user>/expo-builder-local-*` just
# works. linux/amd64 only — no cross-platform emulation, since the runner image's
# full Android SDK/NDK download would be very slow (and untested) under QEMU.
#
# Requires (set up once via docs/DOCKER.md, not by this workflow):
#   - repo secret DOCKERHUB_USERNAME: the Docker Hub account/namespace
#   - repo secret DOCKERHUB_TOKEN: a Docker Hub access token with
#     Read & Write scope for that account

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [runner, orchestrator, web]
        include:
          - image: runner
            context: expo-builder-local/docker/runner
          - image: orchestrator
            context: expo-builder-local/orchestrator
          - image: web
            context: expo-builder-local/expo-builder-gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: expo-builder-local

      - name: Verify Docker Hub secrets are configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN are not set. Complete the maintainer setup in docs/DOCKER.md first."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/expo-builder-local-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
