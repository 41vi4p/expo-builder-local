name: expo-builder-local

services:
  # The Android build toolchain image. Not a running service — `docker compose up`
  # never starts it; the orchestrator spawns short-lived containers from it per build
  # (see orchestrator/src/docker/runner.ts). Kept as a compose service purely so
  # `docker compose build` builds everything in one command; the "build-only" profile
  # keeps it out of the default `up`.
  runner:
    build:
      context: docker/runner
      dockerfile: Dockerfile
    image: ${RUNNER_IMAGE:-expo-builder-local-runner:latest}
    profiles: ["build-only"]
    command: ["true"]

  orchestrator:
    build:
      context: orchestrator
      dockerfile: Dockerfile
    image: expo-builder-local-orchestrator:latest
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 by default — this API can create/attach to arbitrary
      # containers via the mounted Docker socket, which is root-equivalent on the
      # host. Only widen this if you understand that trade-off.
      - "127.0.0.1:${ORCHESTRATOR_PORT:-4001}:4001"
    environment:
      PORT: "4001"
      HOST: "0.0.0.0"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DATA_DIR: /data
      DOCKER_SOCKET: /var/run/docker.sock
      RUNNER_IMAGE: ${RUNNER_IMAGE:-expo-builder-local-runner:latest}
      GRADLE_CACHE_VOLUME: expo-builder-local_gradle-cache
      NPM_CACHE_VOLUME: expo-builder-local_npm-cache
      # See config.ts: must equal HOST_PROJECTS_ROOT exactly, and the bind mount below
      # must mount it at that same path — this container is a Docker *sibling*, not a
      # nested container, so every path handed to the daemon is a host path.
      ALLOWED_ROOTS: ${HOST_PROJECTS_ROOT}
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      MASTER_KEY: "${MASTER_KEY:?Set MASTER_KEY in .env - generate one with 'openssl rand -base64 32'}"
      EXPO_TOKEN: ${EXPO_TOKEN:-}
      MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PROJECTS_ROOT}:${HOST_PROJECTS_ROOT}
      - expo-builder-data:/data

  web:
    build:
      context: expo-builder-gui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ORCHESTRATOR_URL: ${ORCHESTRATOR_PUBLIC_URL:-http://localhost:4001}
    image: expo-builder-local-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      - orchestrator

volumes:
  expo-builder-data: {}
  gradle-cache:
    name: expo-builder-local_gradle-cache
  npm-cache:
    name: expo-builder-local_npm-cache
